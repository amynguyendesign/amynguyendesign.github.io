			const { useState, useEffect, useRef } = React;

			function UserDiv() {

  // ─── CONSTANTS ───

  // ─── STATE ───

  // ─── RESPONSIVE ───
  useEffect(() => {

    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  // ─── HELPERS ───
  const hs = (h, s, l) => `hsl(${((h % 360) + 360) % 360}, ${s}%, ${l}%)`;
  const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  const shuffle = (arr) => {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  };

  const nameHash = (name) => {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
    return Math.abs(h);
  };

  // ─── SOUND SYSTEM ───
  const getAudio = () => {
    if (!audioRef.current) {
      try { audioRef.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    if (audioRef.current && audioRef.current.state === 'suspended') {
      audioRef.current.resume();
    }
    return audioRef.current;
  };

  const playTone = (freq, dur, wave = 'sine', vol = 0.12, rampTo) => {
    const ctx = getAudio();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = wave;
    osc.frequency.value = freq;
    if (rampTo) osc.frequency.exponentialRampToValueAtTime(rampTo, ctx.currentTime + dur);
    gain.gain.value = vol;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  };

  const sfx = {
    click: () => playTone(880, 0.04, 'sine', 0.06),
    hover: () => playTone(1200, 0.03, 'sine', 0.04),
    correct: () => {
      playTone(523, 0.12, 'sine', 0.25);
      setTimeout(() => playTone(659, 0.12, 'sine', 0.25), 80);
      setTimeout(() => playTone(784, 0.18, 'sine', 0.25), 160);
    },
    wrong: () => {
      playTone(330, 0.15, 'triangle', 0.22);
      setTimeout(() => playTone(262, 0.2, 'triangle', 0.22), 100);
    },
    start: () => {
      playTone(523, 0.1, 'sine', 0.1);
      setTimeout(() => playTone(659, 0.1, 'sine', 0.1), 100);
      setTimeout(() => playTone(784, 0.1, 'sine', 0.1), 200);
      setTimeout(() => playTone(1047, 0.16, 'sine', 0.1), 300);
    },
    streak: (n) => {
      const base = Math.min(n, 6);
      playTone(600 + base * 60, 0.08, 'sine', 0.1);
      setTimeout(() => playTone(700 + base * 60, 0.08, 'sine', 0.1), 70);
      setTimeout(() => playTone(800 + base * 60, 0.12, 'sine', 0.1), 140);
    },
    doneGood: () => {
      [523,659,784,1047,784,1047].forEach((f,i) =>
        setTimeout(() => playTone(f, 0.14, 'sine', 0.1), i * 100)
      );
    },
    doneBad: () => {
      [440,523,440].forEach((f,i) =>
        setTimeout(() => playTone(f, 0.14, 'sine', 0.08), i * 120)
      );
    },
    save: () => {
      playTone(784, 0.1, 'sine', 0.1);
      setTimeout(() => playTone(1047, 0.14, 'sine', 0.1), 100);
    },
  };

  // ─── HUE NAMING ───
  const hueName = (h) => {
    h = ((h % 360) + 360) % 360;
    if (h < 15) return 'red';
    if (h < 40) return 'orange';
    if (h < 70) return 'yellow';
    if (h < 150) return 'green';
    if (h < 190) return 'teal';
    if (h < 260) return 'blue';
    if (h < 290) return 'purple';
    if (h < 340) return 'pink';
    return 'red';
  };

  const hueAngle = (h) => `${((h % 360) + 360) % 360}\u00B0`;

  // ─── COLOR MIXING ───
  const mixHue = (h1, h2) => {
    const r1 = h1 * Math.PI / 180, r2 = h2 * Math.PI / 180;
    let avg = Math.atan2(
      (Math.sin(r1) + Math.sin(r2)) / 2,
      (Math.cos(r1) + Math.cos(r2)) / 2
    ) * 180 / Math.PI;
    return ((avg % 360) + 360) % 360;
  };

  const mixColors = (a, b) => ({
    h: Math.round(mixHue(a.h, b.h)),
    s: Math.round((a.s + b.s) / 2),
    l: Math.round((a.l + b.l) / 2),
  });

  // ─── EASY MODE: pre-defined puzzles with exact colors ───
  // Each entry: a (shown color), b (correct answer), result (shown mix), distractors (3 wrong answers)
  // All colors are exact HSL — no random variation — so they look like what people expect
  const EASY_BANK = [
    // Red + White = Pink
    { a: { h: 0, s: 80, l: 50 },   b: { h: 0, s: 0, l: 95 },    r: { h: 0, s: 40, l: 72 },
      d: [{ h: 120, s: 60, l: 45 }, { h: 220, s: 70, l: 50 }, { h: 50, s: 80, l: 55 }] },
    // White + Black = Gray
    { a: { h: 0, s: 0, l: 95 },    b: { h: 0, s: 0, l: 15 },     r: { h: 0, s: 0, l: 55 },
      d: [{ h: 0, s: 70, l: 50 }, { h: 220, s: 60, l: 50 }, { h: 120, s: 50, l: 45 }] },
    // Yellow + Blue = Green
    { a: { h: 55, s: 90, l: 55 },  b: { h: 220, s: 70, l: 50 },  r: { h: 140, s: 50, l: 48 },
      d: [{ h: 0, s: 75, l: 50 }, { h: 30, s: 80, l: 55 }, { h: 300, s: 55, l: 50 }] },
    // Red + Yellow = Orange
    { a: { h: 0, s: 80, l: 50 },   b: { h: 55, s: 90, l: 55 },   r: { h: 28, s: 85, l: 52 },
      d: [{ h: 220, s: 70, l: 50 }, { h: 280, s: 55, l: 50 }, { h: 160, s: 50, l: 45 }] },
    // Red + Blue = Purple
    { a: { h: 0, s: 80, l: 50 },   b: { h: 220, s: 70, l: 50 },  r: { h: 280, s: 55, l: 45 },
      d: [{ h: 55, s: 85, l: 55 }, { h: 120, s: 60, l: 45 }, { h: 30, s: 80, l: 55 }] },
    // Blue + White = Light Blue
    { a: { h: 220, s: 70, l: 50 }, b: { h: 0, s: 0, l: 95 },     r: { h: 220, s: 35, l: 72 },
      d: [{ h: 0, s: 70, l: 50 }, { h: 55, s: 80, l: 55 }, { h: 280, s: 50, l: 55 }] },
    // Yellow + White = Cream
    { a: { h: 55, s: 90, l: 55 },  b: { h: 0, s: 0, l: 95 },     r: { h: 55, s: 45, l: 75 },
      d: [{ h: 220, s: 60, l: 50 }, { h: 0, s: 70, l: 50 }, { h: 160, s: 50, l: 45 }] },
    // Green + White = Mint
    { a: { h: 140, s: 60, l: 40 }, b: { h: 0, s: 0, l: 95 },     r: { h: 140, s: 30, l: 68 },
      d: [{ h: 0, s: 70, l: 50 }, { h: 280, s: 55, l: 50 }, { h: 30, s: 80, l: 55 }] },
    // Orange + White = Peach
    { a: { h: 25, s: 85, l: 55 },  b: { h: 0, s: 0, l: 95 },     r: { h: 25, s: 42, l: 75 },
      d: [{ h: 220, s: 60, l: 50 }, { h: 120, s: 50, l: 40 }, { h: 300, s: 50, l: 55 }] },
    // Purple + White = Lavender
    { a: { h: 275, s: 55, l: 50 }, b: { h: 0, s: 0, l: 95 },     r: { h: 275, s: 28, l: 72 },
      d: [{ h: 55, s: 80, l: 55 }, { h: 0, s: 70, l: 50 }, { h: 160, s: 50, l: 45 }] },
    // Red + Black = Maroon
    { a: { h: 0, s: 80, l: 50 },   b: { h: 0, s: 0, l: 15 },     r: { h: 0, s: 40, l: 32 },
      d: [{ h: 120, s: 60, l: 45 }, { h: 55, s: 80, l: 55 }, { h: 220, s: 60, l: 50 }] },
    // Blue + Black = Navy
    { a: { h: 220, s: 70, l: 50 }, b: { h: 0, s: 0, l: 15 },     r: { h: 220, s: 35, l: 32 },
      d: [{ h: 0, s: 70, l: 50 }, { h: 55, s: 80, l: 55 }, { h: 120, s: 50, l: 40 }] },
    // Green + Black = Dark Green
    { a: { h: 140, s: 60, l: 40 }, b: { h: 0, s: 0, l: 15 },     r: { h: 140, s: 30, l: 28 },
      d: [{ h: 0, s: 70, l: 50 }, { h: 55, s: 80, l: 55 }, { h: 280, s: 55, l: 50 }] },
    // Blue + Green = Teal
    { a: { h: 220, s: 70, l: 50 }, b: { h: 140, s: 60, l: 40 },  r: { h: 180, s: 55, l: 42 },
      d: [{ h: 0, s: 70, l: 50 }, { h: 55, s: 80, l: 55 }, { h: 300, s: 55, l: 50 }] },
    // Green + Yellow = Lime
    { a: { h: 140, s: 60, l: 40 }, b: { h: 55, s: 90, l: 55 },   r: { h: 90, s: 65, l: 48 },
      d: [{ h: 0, s: 70, l: 50 }, { h: 220, s: 60, l: 50 }, { h: 300, s: 55, l: 50 }] },
    // Pink + White = Light Pink
    { a: { h: 335, s: 65, l: 60 }, b: { h: 0, s: 0, l: 95 },     r: { h: 335, s: 32, l: 78 },
      d: [{ h: 120, s: 60, l: 45 }, { h: 55, s: 80, l: 55 }, { h: 220, s: 60, l: 50 }] },
    // Purple + Red = Magenta
    { a: { h: 275, s: 55, l: 50 }, b: { h: 0, s: 80, l: 50 },    r: { h: 318, s: 60, l: 48 },
      d: [{ h: 55, s: 80, l: 55 }, { h: 120, s: 50, l: 40 }, { h: 200, s: 60, l: 50 }] },
    // Orange + Red = Red-Orange
    { a: { h: 25, s: 85, l: 55 },  b: { h: 0, s: 80, l: 50 },    r: { h: 12, s: 82, l: 52 },
      d: [{ h: 220, s: 60, l: 50 }, { h: 120, s: 50, l: 40 }, { h: 280, s: 55, l: 50 }] },
    // Cyan + White = Pale Cyan
    { a: { h: 185, s: 60, l: 45 }, b: { h: 0, s: 0, l: 95 },     r: { h: 185, s: 30, l: 70 },
      d: [{ h: 0, s: 70, l: 50 }, { h: 55, s: 80, l: 55 }, { h: 300, s: 50, l: 55 }] },
    // Orange + Black = Brown
    { a: { h: 25, s: 85, l: 55 },  b: { h: 0, s: 0, l: 15 },     r: { h: 25, s: 42, l: 35 },
      d: [{ h: 220, s: 60, l: 50 }, { h: 120, s: 50, l: 40 }, { h: 280, s: 55, l: 50 }] },
    // Pink + Purple = Orchid
    { a: { h: 335, s: 65, l: 60 }, b: { h: 275, s: 55, l: 50 },  r: { h: 305, s: 50, l: 52 },
      d: [{ h: 55, s: 80, l: 55 }, { h: 120, s: 50, l: 40 }, { h: 25, s: 80, l: 55 }] },
    // Yellow + Orange = Gold
    { a: { h: 55, s: 90, l: 55 },  b: { h: 25, s: 85, l: 55 },   r: { h: 40, s: 87, l: 55 },
      d: [{ h: 220, s: 60, l: 50 }, { h: 120, s: 50, l: 40 }, { h: 300, s: 55, l: 50 }] },
    // Cyan + Blue = Azure
    { a: { h: 185, s: 60, l: 45 }, b: { h: 220, s: 70, l: 50 },  r: { h: 202, s: 60, l: 46 },
      d: [{ h: 0, s: 70, l: 50 }, { h: 55, s: 80, l: 55 }, { h: 120, s: 50, l: 40 }] },
    // Purple + Blue = Indigo
    { a: { h: 275, s: 55, l: 50 }, b: { h: 220, s: 70, l: 50 },  r: { h: 248, s: 55, l: 46 },
      d: [{ h: 55, s: 80, l: 55 }, { h: 0, s: 70, l: 50 }, { h: 120, s: 50, l: 40 }] },
    // Pink + Red = Hot Pink
    { a: { h: 335, s: 65, l: 60 }, b: { h: 0, s: 80, l: 50 },    r: { h: 348, s: 72, l: 55 },
      d: [{ h: 120, s: 50, l: 40 }, { h: 220, s: 60, l: 50 }, { h: 55, s: 80, l: 55 }] },
    // Purple + Black = Dark Purple
    { a: { h: 275, s: 55, l: 50 }, b: { h: 0, s: 0, l: 15 },     r: { h: 275, s: 28, l: 32 },
      d: [{ h: 55, s: 80, l: 55 }, { h: 0, s: 70, l: 50 }, { h: 120, s: 50, l: 40 }] },
    // Cyan + Green = Sea Green
    { a: { h: 185, s: 60, l: 45 }, b: { h: 140, s: 60, l: 40 },  r: { h: 162, s: 52, l: 40 },
      d: [{ h: 0, s: 70, l: 50 }, { h: 55, s: 80, l: 55 }, { h: 280, s: 55, l: 50 }] },
    // Pink + Yellow = Salmon
    { a: { h: 335, s: 65, l: 60 }, b: { h: 55, s: 90, l: 55 },   r: { h: 15, s: 65, l: 58 },
      d: [{ h: 220, s: 60, l: 50 }, { h: 120, s: 50, l: 40 }, { h: 275, s: 55, l: 50 }] },
  ];

  // Track used easy indices per game to avoid repeats
  const usedEasyRef = useRef([]);

  // Indices of "tint" puzzles (answer is white) — easiest questions
  const WHITE_MIX_INDICES = EASY_BANK.map((q, i) => q.b.s === 0 && q.b.l >= 90 ? i : -1).filter(i => i >= 0);

  const genEasyPuzzle = (roundNum) => {
    // ~20% chance (after round 4) to use a hard-mode "easy" puzzle for variety
    if (roundNum > 4 && Math.random() < 0.2) {
      return genMixPuzzle('easy');
    }
    // First 2 rounds: always a white-mix (color + white = tint) — easiest to grasp
    let pool;
    if (roundNum < 2) {
      pool = WHITE_MIX_INDICES.filter(i => !usedEasyRef.current.includes(i));
      if (pool.length === 0) pool = WHITE_MIX_INDICES; // fallback
    } else {
      pool = EASY_BANK.map((_, i) => i).filter(i => !usedEasyRef.current.includes(i));
      if (pool.length === 0) { usedEasyRef.current = []; pool = EASY_BANK.map((_, i) => i); }
    }
    const idx = pool[Math.floor(Math.random() * pool.length)];
    usedEasyRef.current.push(idx);
    const q = EASY_BANK[idx];

    // Use exact pre-defined colors — no variation
    const options = shuffle([
      { ...q.b, isCorrect: true },
      ...q.d.map(d => ({ ...d, isCorrect: false })),
    ]);
    const correctIdx = options.findIndex(o => o.isCorrect);
    return { colorA: q.a, colorC: q.r, correct: q.b, options, correctIdx, difficulty: 'easy' };
  };

  // ─── PUZZLE GENERATION ───
  const difficultyForRound = (r) => {
    if (r < 3) return 'easy';
    if (r < 6) return 'medium';
    return 'hard';
  };

  const genMixPuzzle = (difficulty) => {
    // Pick color A
    const a = { h: rand(0, 359), s: rand(50, 80), l: rand(40, 60) };

    // Difficulty controls how far apart A and B are, and how close distractors are
    let hueGap, distSpread;
    if (difficulty === 'easy') { hueGap = rand(70, 150); distSpread = rand(50, 90); }
    else if (difficulty === 'medium') { hueGap = rand(35, 80); distSpread = rand(28, 50); }
    else { hueGap = rand(15, 45); distSpread = rand(12, 28); }

    const dir = Math.random() > 0.5 ? 1 : -1;
    const b = {
      h: ((a.h + hueGap * dir) % 360 + 360) % 360,
      s: Math.max(25, Math.min(85, a.s + rand(-15, 15))),
      l: Math.max(30, Math.min(70, a.l + rand(-10, 10))),
    };

    // Result = mix of A and B
    const c = mixColors(a, b);

    // Generate 3 distractors — close enough to be tricky
    const distractors = [];
    const usedHues = [b.h];
    for (let i = 0; i < 3; i++) {
      let dh, attempts = 0;
      do {
        const shift = rand(Math.floor(distSpread * 0.5), distSpread) * (Math.random() > 0.5 ? 1 : -1);
        dh = ((b.h + shift) % 360 + 360) % 360;
        attempts++;
      } while (attempts < 20 && usedHues.some(uh => {
        const diff = Math.abs(dh - uh);
        return Math.min(diff, 360 - diff) < 10;
      }));
      usedHues.push(dh);
      distractors.push({
        h: dh,
        s: Math.max(20, Math.min(90, b.s + rand(-12, 12))),
        l: Math.max(25, Math.min(75, b.l + rand(-10, 10))),
      });
    }

    const options = shuffle([
      { ...b, isCorrect: true },
      ...distractors.map(d => ({ ...d, isCorrect: false })),
    ]);
    const correctIdx = options.findIndex(o => o.isCorrect);

    return { colorA: a, colorC: c, correct: b, options, correctIdx, difficulty };
  };

  // ─── LEADERBOARD (Firebase Realtime DB) ───
  const [board, setBoard] = useState([]);
  const [boardLoaded, setBoardLoaded] = useState(false);

  // Listen for realtime leaderboard updates
  useEffect(() => {
    const ref = db.ref('scores');
    ref.orderByChild('score').on('value', (snap) => {
      const entries = [];
      snap.forEach((child) => {
        entries.push({ key: child.key, ...child.val() });
      });
      // Sort: highest score first, then alphabetical by name
      entries.sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));
      setBoard(entries);
      setBoardLoaded(true);
    });
    return () => ref.off();
  }, []);

  const getBoard = () => board;
  // Leaderboard only shows hard mode entries (or legacy entries without mode field)
  const hardBoard = board.filter(e => !e.mode || e.mode === 'hard');

  const lastEntryKeyRef = useRef(null);
  const saveToFirebase = (entry) => {

        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '0 20px 20px', position: 'relative', flex: 1 }}>
          <div style={{ flex: 1 }} />
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 44, width: '100%' }}>
            <Pill color={P.text} style={{ animation: 'op-pop 0.3s both' }}>which color completes the mix?</Pill>
            <div key={`prompt-${round}`} style={{ animation: 'op-pop 0.3s both' }}>
              <MixEquation colorA={puzzle.colorA} colorC={puzzle.colorC} size={eqSize} showAnswer={false} />
            </div>
            <div style={{
              display: 'grid', gridTemplateColumns: '1fr 1fr',
              gap: 14, background: 'rgba(255,255,255,0.95)', borderRadius: 28,
              border: `2px solid ${P.border}`, padding: 18,
              backdropFilter: 'blur(6px)', animation: 'op-pop 0.35s 0.1s both',
            }}>
              {puzzle.options.map((c, i) => (
                <div key={`${round}-${i}`} onClick={() => handlePick(i)}
                  tabIndex={0} role="button" aria-label={`Color option ${i + 1}`}
                  onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handlePick(i); } }}
                  onMouseEnter={() => { setHoveredSwatch(i); sfx.hover(); }}
                  onMouseLeave={() => setHoveredSwatch(-1)}
                  style={{
                    width: optSize, height: optSize, borderRadius: 22, cursor: 'pointer',
                    background: hs(c.h, c.s, c.l), border: `2px solid ${P.border}`,
                    transform: hoveredSwatch === i ? 'scale(1.1) rotate(-3deg)' : 'scale(1)',
                    transition: 'transform 0.25s cubic-bezier(0.34,1.56,0.64,1)',
                    animation: `op-pop 0.3s ${i * 0.06 + 0.15}s both`,
                  }}
                />
              ))}
            </div>
          </div>
          <div style={{ flex: 1.6 }} />
        </div>
      );
    }

    // Desktop: original layout with space-evenly
    return (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '36px 40px', gap: 26, position: 'relative', flex: 1, justifyContent: 'space-evenly' }}>
        <div key={`prompt-${round}`} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 26, animation: 'op-pop 0.3s both' }}>
          <Pill color={P.text}>which color completes the mix?</Pill>
          <MixEquation colorA={puzzle.colorA} colorC={puzzle.colorC} size={eqSize} showAnswer={false} />
        </div>
        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr',
          gap: 18, background: 'rgba(255,255,255,0.95)', borderRadius: 32,
          border: `2.5px solid ${P.border}`, padding: 28,
          backdropFilter: 'blur(6px)', animation: 'op-pop 0.35s 0.1s both',
        }}>
          {puzzle.options.map((c, i) => (
            <div key={`${round}-${i}`} onClick={() => handlePick(i)}
              tabIndex={0} role="button" aria-label={`Color option ${i + 1}`}
              onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handlePick(i); } }}
              onMouseEnter={() => { setHoveredSwatch(i); sfx.hover(); }}
              onMouseLeave={() => setHoveredSwatch(-1)}
              style={{
                width: optSize, height: optSize, borderRadius: 24, cursor: 'pointer',
                background: hs(c.h, c.s, c.l), border: `3px solid ${P.border}`,
                transform: hoveredSwatch === i ? 'scale(1.1) rotate(-3deg)' : 'scale(1)',
                transition: 'transform 0.25s cubic-bezier(0.34,1.56,0.64,1)',
                animation: `op-pop 0.3s ${i * 0.06 + 0.15}s both`,
              }}
            />
          ))}
        </div>
      </div>
    );
  };

  const renderReveal = () => {
    if (!puzzle) return null;
    const correct = picked === puzzle.correctIdx;
    const eqSize = isMobile ? 52 : 64;
    const optSize = isMobile ? 76 : 88;
    const btnLabel = round >= GAME_ROUNDS - 1 ? 'see results' : 'next';

    const revealContent = (
      <>
        <div style={{
          fontSize: isMobile ? '1.375rem' : '1.625rem', fontWeight: 800,
          color: correct ? P.ok : P.no,
          animation: correct ? 'op-bounce 0.3s both' : 'op-shake 0.3s both',
        }}>{phraseRef.current}</div>
        <MixEquation colorA={puzzle.colorA} colorB={puzzle.correct} colorC={puzzle.colorC} size={eqSize} showAnswer={true} />
        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr',
          gap: isMobile ? 14 : 18,
          background: 'rgba(255,255,255,0.95)', borderRadius: isMobile ? 28 : 32,
          border: `${isMobile ? 2 : 2.5}px solid ${P.border}`, padding: isMobile ? 18 : 28,
          backdropFilter: 'blur(6px)',
        }}>
          {puzzle.options.map((c, i) => {
            const isCorrect = i === puzzle.correctIdx;
            const isPicked = i === picked;
            const isWrongPick = isPicked && !correct;
            let borderColor = P.border;
            let anim = '';
            if (isCorrect) { borderColor = P.ok; anim = 'op-ring 1.2s infinite'; }
            if (isWrongPick) { borderColor = P.no; anim = 'op-shake 0.3s both'; }
            return (
              <div key={`${round}-r-${i}`} style={{
                width: optSize, height: optSize, borderRadius: isMobile ? 22 : 24,
                background: hs(c.h, c.s, c.l),
                border: `${isCorrect || isWrongPick ? 4 : isMobile ? 2 : 3}px solid ${borderColor}`,
                opacity: isWrongPick ? 0.35 : (!isCorrect && !isPicked) ? 0.25 : 1,
                transition: 'all 0.3s ease', animation: anim,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                {isWrongPick && <span style={{
                  fontSize: isMobile ? '1.75rem' : '2.25rem', fontWeight: 800, color: P.no,
                  lineHeight: 1, filter: 'drop-shadow(0 1px 2px rgba(0,0,0,0.15))',
                }}>{'\u2715'}</span>}
              </div>
            );
          })}
        </div>
        <div style={{ animation: 'op-up 0.3s 0.15s both' }}>
          <Btn onClick={nextRound}>{btnLabel}</Btn>
        </div>
      </>
    );

    if (isMobile) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '0 20px 20px', position: 'relative', flex: 1 }}>
          <div style={{ flex: 1 }} />
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 28, width: '100%' }}>
            {revealContent}
          </div>
          <div style={{ flex: 1.6 }} />
        </div>
      );
    }

    return (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '36px 40px', gap: 26, position: 'relative', flex: 1, justifyContent: 'space-evenly' }}>
        {revealContent}
      </div>
    );
  };

  // SVG illustrations for done screen tiers
  const DoneIllustration = ({ tier, size = 64 }) => {
    if (tier === 'genius') return (
      <svg aria-hidden="true" width={size} height={size} viewBox="0 4 64 64" fill="none">
        <circle cx="32" cy="32" r="26" fill={P.lavender} opacity="0.18" />
        <circle cx="32" cy="32" r="16" fill={P.lilac} opacity="0.3" />
        <path d="M32 10l4 12h12l-10 7 4 12-10-7-10 7 4-12-10-7h12z" fill={P.lavender} stroke={P.lilac} strokeWidth="1.5" />
      </svg>
    );
    if (tier === 'sharp') return (
      <svg aria-hidden="true" width={size} height={size} viewBox="0 4 64 64" fill="none">
        <circle cx="32" cy="32" r="26" fill={P.sky} opacity="0.15" />
        <circle cx="32" cy="34" r="14" stroke={P.sky} strokeWidth="2.5" fill="none" />
        <circle cx="32" cy="34" r="5" fill={P.sky} />
        <line x1="32" y1="12" x2="32" y2="18" stroke={P.lilac} strokeWidth="2" strokeLinecap="round" />
        <line x1="44" y1="22" x2="40" y2="26" stroke={P.lilac} strokeWidth="2" strokeLinecap="round" />
        <line x1="20" y1="22" x2="24" y2="26" stroke={P.lilac} strokeWidth="2" strokeLinecap="round" />
      </svg>
    );
    if (tier === 'getting') return (
      <svg aria-hidden="true" width={size} height={size} viewBox="0 14 64 64" fill="none">
        <circle cx="32" cy="38" r="22" fill={P.butter} opacity="0.15" />
        <ellipse cx="32" cy="42" rx="14" ry="8" fill={P.peach} opacity="0.3" />
        <path d="M24 36c0-8 4-16 8-20 4 4 8 12 8 20" stroke={P.butter} strokeWidth="2.5" fill={P.butter} opacity="0.5" strokeLinecap="round" />
        <path d="M28 38c0-5 2-10 4-13 2 3 4 8 4 13" fill={P.peach} />
        <path d="M30 42v6M34 42v6" stroke={P.coral} strokeWidth="1.5" strokeLinecap="round" />
      </svg>
    );
    // bloom
    return (
      <svg aria-hidden="true" width={size} height={size} viewBox="0 18 64 64" fill="none">
        <circle cx="32" cy="40" r="20" fill={P.mint} opacity="0.12" />
        <path d="M32 48v-18" stroke={P.sage} strokeWidth="2.5" strokeLinecap="round" />
        <path d="M26 34c-4-6-2-14 6-14 8 0 10 8 6 14" fill={P.mint} opacity="0.6" />
        <path d="M28 36c-2-4-1-9 4-9s6 5 4 9" fill={P.sage} opacity="0.5" />
        <ellipse cx="32" cy="50" rx="6" ry="2.5" fill={P.sage} opacity="0.25" />
      </svg>
    );
  };

  // ─── SHARE CARD GENERATOR ───
  const shareCanvasRef = useRef(null);
  const [shareReady, setShareReady] = useState(false);
  const [copied, setCopied] = useState(false);

  const getShareName = () => {
    const n = (savedName || nameInput || getEasySavedName() || getSavedName()).trim();
    return n || '';
  };

  const getShareText = () => {
    const n = getShareName();
    const who = n ? n : 'i';
    const mode = gameMode === 'easy' ? ' (easy)' : '';
    return `${who} scored ${score}/${GAME_ROUNDS} on m\u00E9lange${mode} \u2014 think you can mix better? \uD83C\uDFA8\nhttps://amynguyen.studio/game`;
  };

  const generateShareCard = () => {
    const canvas = document.createElement('canvas');
    const w = 600, h = 340;
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');

    // Background gradient
    const bg = ctx.createLinearGradient(0, 0, w, h);
    bg.addColorStop(0, '#F5F3F8');
    bg.addColorStop(1, '#E8E4EE');
    ctx.fillStyle = bg;
    ctx.roundRect(0, 0, w, h, 0);
    ctx.fill();

    // Inner card
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.roundRect(30, 30, w - 60, h - 60, 24);
    ctx.fill();

    // Title
    ctx.fillStyle = '#3E2F2F';
    ctx.font = '800 28px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('m\u00E9lange', w / 2, 85);

    // Score
    const pct = score / GAME_ROUNDS;
    let gradA, gradB;
    if (pct >= 0.88) { gradA = '#2EA896'; gradB = '#5CC4B4'; }
    else if (pct >= 0.63) { gradA = '#7CB8E0'; gradB = '#5CC4B4'; }
    else if (pct >= 0.38) { gradA = '#E8C878'; gradB = '#F2C4A0'; }
    else { gradA = '#8DD8C0'; gradB = '#7CB8E0'; }

    // Score pill
    const pillW = 200, pillH = 80, pillX = w / 2 - pillW / 2, pillY = 105;
    const sg = ctx.createLinearGradient(pillX, pillY, pillX + pillW, pillY + pillH);
    sg.addColorStop(0, gradA); sg.addColorStop(1, gradB);
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.roundRect(pillX, pillY, pillW, pillH, 20);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = '800 42px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillText(`${score}/${GAME_ROUNDS}`, w / 2, 158);

    // Challenge tagline
    ctx.fillStyle = '#7E7494';
    ctx.font = '500 16px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillText('think you can mix better?', w / 2, 230);

    // URL
    ctx.fillStyle = '#B5ADCA';
    ctx.font = '600 12px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillText('amynguyen.studio/game', w / 2, 280);

    shareCanvasRef.current = canvas;
    setShareReady(true);
  };

  const handleShare = async () => {
    if (!sharedRef.current && lastEntryKeyRef.current) {
      db.ref('scores/' + lastEntryKeyRef.current).update({ shared: true });
    }
    sharedRef.current = true;
    const canvas = shareCanvasRef.current;
    if (!canvas) return;

    const shareText = getShareText();

    // Try native share with image
    try {
      const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
      const file = new File([blob], 'melange-score.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ text: shareText, files: [file] });
        return;
      }
    } catch (e) {}

    // Fallback: copy text to clipboard
    try {
      await navigator.clipboard.writeText(shareText);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (e) {}
  };

  const handleDownloadCard = () => {
    const canvas = shareCanvasRef.current;
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = 'melange-score.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  };

  // Generate share card when entering done phase
  useEffect(() => {
    if (phase === 'done') {
      setShareReady(false);
      setCopied(false);
      setTimeout(() => generateShareCard(), 100);
    }
  }, [phase]);

  const renderDone = () => {
    const pct = score / GAME_ROUNDS;
    let tier, title, grad;
    if (pct >= 0.88) { tier = 'genius'; title = 'color genius!'; grad = `linear-gradient(135deg, ${P.cta}, ${P.ctaLight})`; }
    else if (pct >= 0.63) { tier = 'sharp'; title = 'sharp eye!'; grad = `linear-gradient(135deg, ${P.sky}, ${P.ctaLight})`; }
    else if (pct >= 0.38) { tier = 'getting'; title = 'getting there!'; grad = `linear-gradient(135deg, ${P.butter}, ${P.peach})`; }
    else { tier = 'bloom'; title = 'keep blooming!'; grad = `linear-gradient(135deg, ${P.mint}, ${P.sky})`; }

    return (
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: isMobile ? '20px 20px' : '40px 40px', overflow: 'auto' }}>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: isMobile ? 16 : 22 }}>
        <DoneIllustration tier={tier} size={isMobile ? 64 : 80} />
        <h2 style={{ fontSize: isMobile ? '1.625rem' : '2.125rem', fontWeight: 800, color: P.text, margin: 0, letterSpacing: '-0.03em', animation: 'op-up 0.3s 0.1s both' }}>{title}</h2>
        <div style={{
          background: grad, borderRadius: isMobile ? 22 : 26, padding: isMobile ? '20px 40px' : '28px 56px',
          color: '#fff', textAlign: 'center', animation: 'op-up 0.3s 0.15s both',
        }}>
          <div style={{ fontSize: isMobile ? '2.625rem' : '3.5rem', fontWeight: 800 }}>{score}/{GAME_ROUNDS}</div>
          <div style={{ fontSize: '1rem', opacity: 0.85, fontWeight: 600 }}>correct</div>
        </div>
        {/* Scrollable leaderboard (hard mode only) */}
        {gameMode === 'hard' && hardBoard.length > 0 && (
          <div style={{
            animation: 'op-up 0.3s 0.2s both', width: '100%', maxWidth: isMobile ? 340 : 420,
            background: 'rgba(255,255,255,0.92)', borderRadius: 18,
            border: `2px solid ${P.border}`, overflow: 'hidden',
          }}>
            <div ref={leaderboardRef} style={{
              maxHeight: isMobile ? 180 : 220, overflowY: 'auto',
              padding: '4px 0',
            }}>
              {hardBoard.map((entry, i) => {
                const isMe = entry.name === savedName && entry.score === score;
                const avatarColor = ACCENTS[nameHash(entry.name) % ACCENTS.length];
                // Tied rank: same rank if same score as previous entry
                const rank = i === 0 || hardBoard[i - 1].score !== entry.score ? i + 1 : hardBoard.findIndex(e => e.score === entry.score) + 1;
                return (
                  <div key={entry.key || i} data-me={isMe || undefined} style={{
                    display: 'flex', alignItems: 'center', gap: isMobile ? 8 : 12,
                    padding: isMobile ? '8px 14px' : '9px 18px',
                    background: isMe ? `${P.cta}12` : 'transparent',
                    borderLeft: isMe ? `3px solid ${P.cta}` : '3px solid transparent',
                    transition: 'background 0.2s',
                  }}>
                    <span style={{
                      fontSize: '0.75rem', fontWeight: 800, color: rank <= 3 ? P.cta : P.dim,
                      minWidth: 28, textAlign: 'right',
                    }}>#{rank}</span>
                    <div style={{
                      width: 26, height: 26, borderRadius: '50%', background: avatarColor,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: '0.6875rem', fontWeight: 800, color: '#fff', flexShrink: 0,
                    }}>{entry.name[0].toUpperCase()}</div>
                    <div style={{ flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontSize: '0.875rem', fontWeight: isMe ? 700 : 500, color: isMe ? P.text : P.sub }}>
                      {entry.name}
                    </div>
                    <span style={{ fontSize: '0.875rem', fontWeight: 800, color: isMe ? P.cta : P.text }}>{entry.score}/{entry.rounds}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {gameMode === 'easy' && (
          <div style={{ animation: 'op-up 0.3s 0.2s both', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, width: '100%', maxWidth: 280 }}>
            {easyNameSaved || getEasySavedName() ? (
              <div style={{ fontSize: '0.8125rem', color: P.cta, fontWeight: 600, textAlign: 'center' }}>
                {easyNameSaved ? 'saved!' : `playing as ${getEasySavedName()}`} — try hard mode to get ranked!
              </div>
            ) : (
              <>
                <div style={{ fontSize: '0.8125rem', color: P.dim, fontWeight: 500, textAlign: 'center' }}>
                  save your name to track your streak?
                </div>
                <input
                  className="op-input"
                  value={easyNameInput}
                  onChange={(e) => setEasyNameInput(e.target.value)}
                  onKeyDown={(e) => {
                    const n = easyNameInput.trim();
                    if (e.key === 'Enter' && n && !nameErrorEasy(n)) {
                      setEasySavedName(n); setSavedName(n); setEasyNameSaved(true);
                    }
                  }}
                  placeholder="your name"
                  maxLength={20}
                  style={{
                    width: '100%', padding: '10px 14px', borderRadius: 12,
                    border: `2px solid ${nameErrorEasy(easyNameInput.trim()) ? P.no : P.border}`,
                    background: 'rgba(255,255,255,0.9)',
                    fontSize: '0.875rem', fontWeight: 600, color: P.text,
                    textAlign: 'center', outline: 'none', fontFamily: 'inherit',
                  }}
                />
                {nameErrorEasy(easyNameInput.trim()) && (
                  <div style={{ fontSize: '0.75rem', color: P.no, fontWeight: 600 }}>
                    {nameErrorEasy(easyNameInput.trim())}
                  </div>
                )}
              </>
            )}
          </div>
        )}
        {/* Actions: share + save/play again on same line */}
        <div style={{ display: 'flex', gap: 12, animation: 'op-up 0.3s 0.3s both' }}>
          <Btn onClick={handleShare}>
            {copied ? 'copied!' : 'share'}
          </Btn>
          {gameMode === 'easy' && !easyNameSaved && !getEasySavedName() && easyNameInput.trim() && !nameErrorEasy(easyNameInput.trim()) && (
            <Btn onClick={() => {
              const n = easyNameInput.trim();
              if (n && !nameErrorEasy(n)) {
                setEasySavedName(n); setSavedName(n); setEasyNameSaved(true);
              }
            }}>save name</Btn>
          )}
          <Btn onClick={() => { sfx.click(); setPhase('menu'); }}>play again</Btn>
        </div>
        </div>
      </div>
    );
  };

  // ─── MAIN RENDER ───
  const content = phase === 'menu' ? renderMenu()
    : phase === 'nameEntry' ? renderNameEntry()
    : phase === 'play' ? renderPlay()
    : phase === 'reveal' ? renderReveal()
    : renderDone();

  return (
    <main
      ref={wrapRef}
      style={{
        position: 'relative',
        width: '100%',
        maxWidth: isMobile ? '100%' : 900,
        minHeight: isMobile ? '100dvh' : '85vh',
        display: 'flex', flexDirection: 'column',
        justifyContent: isMobile ? 'center' : undefined,
        background: `linear-gradient(180deg, ${P.bg}, ${P.bg2})`,
        borderRadius: isMobile ? 0 : 32,
        overflow: 'hidden',
        fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
        color: P.text,
        boxSizing: 'border-box',
        boxShadow: isMobile ? 'none' : '0 8px 40px rgba(74,54,96,0.08)',
      }}
    >
      <style>{`
        @keyframes op-pop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes op-up { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes op-shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
        @keyframes op-bounce { 0% { transform: scale(1); } 25% { transform: scale(1.18); } 50% { transform: scale(0.94); } 75% { transform: scale(1.04); } 100% { transform: scale(1); } }
        @keyframes op-wiggle { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }
        @keyframes op-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        @keyframes op-pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.65; } }
        @keyframes op-ring { 0%,100% { box-shadow: 0 0 0 0 rgba(125,212,160,0.5); } 50% { box-shadow: 0 0 0 10px rgba(125,212,160,0); } }
        @keyframes op-twinkle { 0%,100% { opacity: 0.12; transform: scale(0.8); } 50% { opacity: 0.4; transform: scale(1.1); } }
        @keyframes op-heartbeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        @keyframes op-glow { 0%,100% { transform: translateY(0); filter: drop-shadow(0 4px 12px rgba(167,139,219,0.3)); } 50% { transform: translateY(-4px); filter: drop-shadow(0 8px 24px rgba(167,139,219,0.55)); } }
        .op-input:focus { border-color: ${P.cta} !important; outline: none; }
        .op-input::placeholder { color: ${P.dim}; }
      `}</style>
      {(phase === 'play' || phase === 'reveal') && (
        <div style={{ padding: isMobile ? '20px 20px 0' : '36px 40px 0', display: 'flex', justifyContent: 'center' }}>
          <GameProgressBar />
        </div>
      )}
      {content}
    </main>
  );
}

			const root = ReactDOM.createRoot(document.getElementById("root"));
			root.render(<UserDiv />);
		</script>
	</body>
</html>
