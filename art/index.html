<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="color-scheme" content="light" />
		<meta name="theme-color" content="#FFFFFF" />
		<title>Art - Amy Nguyen</title>
		<meta name="description" content="Art gallery - oil, watercolor, acrylic, and graphite works by Amy Nguyen." />
		<link rel="canonical" href="https://amynguyen.studio/art/" />
		<link rel="icon" type="image/svg+xml" href="../public/favicon.svg" />
		<link rel="icon" type="image/x-icon" href="../favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://amynguyen.studio/art/" />
		<meta property="og:title" content="Art - Amy Nguyen" />
		<meta property="og:description" content="Oil, watercolor, acrylic, and graphite works by Amy Nguyen." />
		<meta property="og:image" content="https://amynguyen.studio/public/favicon-96x96.png" />
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="Art - Amy Nguyen" />

		<!-- Preconnect -->
		<link rel="preconnect" href="https://unpkg.com" crossorigin />
		<link rel="dns-prefetch" href="https://www.googletagmanager.com" />

		<!-- Analytics -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-DHB2BNWHZG"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() { dataLayer.push(arguments); }
			gtag("js", new Date());
			gtag("config", "G-DHB2BNWHZG");
		</script>

		<!-- React + Babel -->
		<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
		<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
		<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

		<style>
			* { margin: 0; padding: 0; box-sizing: border-box; }
			body {
				background: #FFFFFF;
				font-family: "Courier New", Courier, monospace;
				-webkit-font-smoothing: antialiased;
			}
			a { text-decoration: none; }
			@media (prefers-reduced-motion: reduce) {
				*, *::before, *::after {
					animation-duration: 0.01ms !important;
					transition-duration: 0.01ms !important;
				}
			}
		</style>
	</head>
	<body>
		<div id="root"></div>
		<script type="text/babel">
			const MONO = '"Courier New", Courier, monospace';
			const COLORS = {
				ink: "#2A2418",
				accent: "#A0785A",
				dark: "#3A3020",
				muted: "#8A7A60",
				faded: "#A09080",
				paper: "#FDFAF6",
			};

			function track(eventName, params) {
				if (typeof gtag === "function") gtag("event", eventName, params || {});
			}

			const ART_IMAGES = [
				{ src: "../src/assets/graphite.jpg", title: "Graphite Study", medium: "Graphite", alt: "Graphite" },
				{ src: "../src/assets/onions.JPG", title: "Onions", medium: "Watercolor", alt: "Onions" },
				{ src: "../src/assets/cactus.jpg", title: "Cactus", medium: "Watercolor", alt: "Cactus" },
				{ src: "../src/assets/sf.jpg", title: "San Francisco", medium: "Watercolor", alt: "SF" },
				{ src: "../src/assets/chocolate.JPG", title: "Chocolate", medium: "Oil", alt: "Chocolate" },
				{ src: "../src/assets/spatula.JPG", title: "Spatula", medium: "Watercolor", alt: "Spatula" },
				{ src: "../src/assets/bird.jpg", title: "Bird", medium: "Watercolor", alt: "Bird" },
				{ src: "../src/assets/metal.jpg", title: "Metal", medium: "Acrylic", alt: "Metal" },
				{ src: "../src/assets/coffee.jpg", title: "Coffee", medium: "Watercolor", alt: "Coffee" },
				{ src: "../src/assets/surreal.jpg", title: "Surreal", medium: "Oil", alt: "Surreal" },
				{ src: "../src/assets/toast.jpg", title: "Toast", medium: "Watercolor", alt: "Toast" },
			];

			function Lightbox({ src, onClose }) {
				if (!src) return null;
				return (
					<div
						onClick={() => { onClose(); track("art_lightbox_close"); }}
						style={{
							position: "fixed",
							inset: 0,
							zIndex: 999,
							background: "rgba(255,255,255,0.75)",
							backdropFilter: "blur(3px)",
							display: "flex",
							alignItems: "center",
							justifyContent: "center",
							cursor: "pointer",
							padding: 24,
						}}
					>
						<div
							style={{ position: "relative", maxWidth: "90%", maxHeight: "85vh" }}
							onClick={(e) => e.stopPropagation()}
						>
							<div
								onClick={onClose}
								style={{
									position: "absolute",
									top: -14,
									right: -14,
									zIndex: 1000,
									width: 26,
									height: 26,
									display: "flex",
									alignItems: "center",
									justifyContent: "center",
									background: COLORS.paper,
									border: "1.5px solid " + COLORS.dark,
									borderRadius: "50%",
									cursor: "pointer",
									fontSize: 12,
									color: COLORS.dark,
									fontFamily: MONO,
									fontWeight: 600,
								}}
							>x</div>
							<img
								src={src}
								alt="Enlarged"
								style={{
									maxWidth: "100%",
									maxHeight: "85vh",
									objectFit: "contain",
									border: "2px solid " + COLORS.dark,
									borderRadius: 1,
									display: "block",
								}}
							/>
						</div>
					</div>
				);
			}

			function ArtCard({ img, isHovered, isDimmed, onHover, onLeave, onClick }) {
				return (
					<div
						onMouseEnter={onHover}
						onMouseLeave={onLeave}
						onClick={onClick}
						style={{
							background: COLORS.paper,
							border: "1.5px solid " + COLORS.dark,
							borderRadius: 1,
							overflow: "hidden",
							cursor: "pointer",
							boxShadow: isHovered ? "2px 3px 8px rgba(58,48,32,0.12)" : "none",
							transform: isHovered ? "translateY(-4px) rotate(-0.5deg)" : "none",
							transition: "all 0.25s ease",
							opacity: isDimmed ? 0.3 : 1,
						}}
					>
						<div style={{ aspectRatio: "1", overflow: "hidden", borderBottom: "1px solid " + COLORS.dark }}>
							<img
								src={img.src}
								alt={img.alt}
								loading="lazy"
								width={400}
								height={400}
								style={{
									width: "100%",
									height: "100%",
									objectFit: "cover",
									display: "block",
									filter: "sepia(5%) contrast(96%)",
								}}
								onError={(e) => { e.target.style.display = "none"; }}
							/>
						</div>
						<div style={{ padding: "6px 8px" }}>
							<div style={{
								fontSize: 9,
								color: COLORS.ink,
								letterSpacing: "0.03em",
								fontWeight: 600,
								opacity: 0.5,
							}}>{img.medium}</div>
						</div>
					</div>
				);
			}

			function App() {
				const [lightboxImg, setLightboxImg] = React.useState(null);
				const [hoveredCard, setHoveredCard] = React.useState(null);
				const isMobile = window.innerWidth <= 600;

				React.useEffect(() => {
					track("page_view", { page_title: "art", page_location: "/art" });
				}, []);

				return (
					<div style={{
						minHeight: "100vh",
						background: "#FFFFFF",
						fontFamily: MONO,
					}}>
						<Lightbox src={lightboxImg} onClose={() => setLightboxImg(null)} />

						{/* Back link */}
						<nav aria-label="Breadcrumb" style={{
							padding: "20px 24px 0",
							maxWidth: 800,
							margin: "0 auto",
						}}>
							<a
								href="/?tab=studio"
								style={{
									fontFamily: MONO,
									fontSize: "0.875rem",
									color: COLORS.dark,
									textDecoration: "none",
									letterSpacing: "0.03em",
									transition: "color 0.15s ease",
									display: "inline-flex",
									alignItems: "center",
									minHeight: 44,
									padding: "8px 0",
									outline: "none",
									borderRadius: 4,
								}}
								onMouseEnter={(e) => e.currentTarget.style.color = COLORS.accent}
								onMouseLeave={(e) => e.currentTarget.style.color = COLORS.dark}
								onFocus={(e) => { e.currentTarget.style.outline = "2px solid " + COLORS.accent; e.currentTarget.style.outlineOffset = "2px"; }}
								onBlur={(e) => { e.currentTarget.style.outline = "none"; }}
							>
								&#8592; studio
							</a>
						</nav>

						{/* Header */}
						<header style={{
							padding: "8px 24px 0",
							maxWidth: 800,
							margin: "0 auto",
						}}>
							<h1 style={{
								fontFamily: MONO,
								fontSize: "1.35rem",
								fontWeight: 700,
								color: COLORS.dark,
								lineHeight: 1.5,
								marginBottom: 2,
							}}>Art.</h1>
							<div style={{
								width: 40,
								height: 2,
								background: COLORS.accent,
								marginBottom: 10,
								borderRadius: 1,
							}} role="presentation" />
							<p style={{
								fontSize: "1rem",
								color: COLORS.ink,
								lineHeight: 1.5,
								letterSpacing: "0.03em",
								fontWeight: 600,
								marginBottom: 20,
							}}>
								A collection of works and studies across oil, watercolor, acrylic, and graphite.
							</p>
						</header>

						{/* Grid */}
						<div style={{
							padding: "0 24px 40px",
							maxWidth: 800,
							margin: "0 auto",
						}}>
							<div style={{
								display: "grid",
								gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(3, 1fr)",
								gap: isMobile ? 10 : 14,
							}}>
								{ART_IMAGES.map((img, i) => (
									<ArtCard
										key={i}
										img={img}
										isHovered={hoveredCard === i}
										isDimmed={lightboxImg && lightboxImg !== img.src}
										onHover={() => setHoveredCard(i)}
										onLeave={() => setHoveredCard(null)}
										onClick={(e) => {
											e.stopPropagation();
											setLightboxImg(img.src);
											track("art_lightbox_open", { image: img.title, medium: img.medium });
										}}
									/>
								))}
							</div>
						</div>

						{/* Footer */}
						<footer style={{
							textAlign: "center",
							padding: "20px 0 32px",
						}}>
							<a
								href="/?tab=studio"
								style={{
									fontFamily: MONO,
									fontSize: "0.875rem",
									color: COLORS.dark,
									textDecoration: "none",
									letterSpacing: "0.03em",
									transition: "color 0.15s ease",
									display: "inline-flex",
									alignItems: "center",
									minHeight: 44,
									padding: "8px 12px",
									outline: "none",
									borderRadius: 4,
								}}
								onMouseEnter={(e) => e.currentTarget.style.color = COLORS.accent}
								onMouseLeave={(e) => e.currentTarget.style.color = COLORS.dark}
								onFocus={(e) => { e.currentTarget.style.outline = "2px solid " + COLORS.accent; e.currentTarget.style.outlineOffset = "2px"; }}
								onBlur={(e) => { e.currentTarget.style.outline = "none"; }}
							>
								&#8592; back to studio
							</a>
						</footer>
					</div>
				);
			}

			ReactDOM.createRoot(document.getElementById("root")).render(<App />);
		</script>
	</body>
</html>
