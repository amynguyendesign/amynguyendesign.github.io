			function track(eventName, params) {
				if (typeof gtag === "function")
					gtag("event", eventName, params || {});
			}

			function pickRandom(arr) {
				return arr[Math.floor(Math.random() * arr.length)];
			}

			function randomEasterEggPosition() {
				const isMobile = window.innerWidth <= 768;
				if (isMobile) {
					return {
						top: Math.max(
							10,
							Math.min(18, 10 + Math.floor(Math.random() * 10)),
						),
						left: Math.max(
							70,
							Math.min(82, 70 + Math.floor(Math.random() * 12)),
						),
					};
				}
				const desktopPositions = [
					{
						top: Math.min(75, 62 + Math.floor(Math.random() * 13)),
						left: Math.min(78, 55 + Math.floor(Math.random() * 23)),
					},
					{
						top: Math.min(75, 62 + Math.floor(Math.random() * 13)),
						left: Math.min(78, 55 + Math.floor(Math.random() * 23)),
					},
					{
						top: Math.max(12, 12 + Math.floor(Math.random() * 12)),
						left: Math.min(78, 60 + Math.floor(Math.random() * 20)),
					},
					{
						top: Math.max(12, 12 + Math.floor(Math.random() * 10)),
						left: Math.min(80, 65 + Math.floor(Math.random() * 18)),
					},
				];
				return pickRandom(desktopPositions);
			}

			/* ─────────────────────────────────────────────

   ───────────────────────────────────────────── */

			function useBlinkingCursor(interval = 530) {
				const [visible, setVisible] = React.useState(true);
				React.useEffect(() => {
					const id = setInterval(
						() => setVisible((c) => !c),
						interval,
					);
					return () => clearInterval(id);
				}, [interval]);
				return visible;
			}

			function useFloatingDoodles() {
				const [doodles, setDoodles] = React.useState([]);
				React.useEffect(() => {
					const chars = "abcdefghijklmnopqrstuvwxyz";
					const spawnDoodle = () => {
						const id = Date.now() + Math.random();
						const char =
							chars[Math.floor(Math.random() * chars.length)];
						const x = 5 + Math.random() * 90;
						const startY = -10 - Math.random() * 5;
						const size = 11 + Math.random() * 3;
						const duration =
							(window.innerWidth <= 768 ? 20 : 12) +
							Math.random() * 8;
						const drift = (Math.random() - 0.5) * 30;
						const rotate = Math.random() * 360;
						setDoodles((prev) => [
							...prev.slice(-18),
							{
								id,
								char,
								x,
								startY,
								size,
								duration,
								drift,
								rotate,
							},
						]);
						setTimeout(
							() =>
								setDoodles((prev) =>
									prev.filter((d) => d.id !== id),
								),
							duration * 1000,
						);
					};
					const interval = setInterval(spawnDoodle, 2000);
					[500, 1200, 2000, 2800].forEach((ms) =>
						setTimeout(spawnDoodle, ms),
					);
					return () => clearInterval(interval);
				}, []);
				return doodles;
			}

			function useTypewriterInput() {
				const [typed, setTyped] = React.useState("");
				const [easterEgg, setEasterEgg] = React.useState(null);
				const [easterEggPos, setEasterEggPos] = React.useState({
					top: 50,
					left: 60,
				});

				const triggerEasterEgg = React.useCallback(
					(displayChar, source) => {
						setTyped(displayChar);
						const pick = pickRandom(EASTER_EGGS);
						setEasterEgg(pick);
						setEasterEggPos(randomEasterEggPosition());
						track("easter_egg", {});
						track(
							source === "tap"
								? "typewriter_tap"
								: "typewriter_key",
							{
								key: displayChar,
								device:
									window.innerWidth <= 768
										? "mobile"
										: "desktop",
							},
						);
					},
					[],
				);

				React.useEffect(() => {
					const handleKey = (e) => {
						if (
							e.target.tagName === "INPUT" ||
							e.target.tagName === "TEXTAREA"
						)
							return;
						if (e.key === "Backspace") {
							e.preventDefault();
							setTyped("");
							setEasterEgg(null);
						} else if (
							e.key.length === 1 &&
							/[a-zA-Z]/.test(e.key)
						) {
							triggerEasterEgg(e.key, "key");
						}
					};
					window.addEventListener("keydown", handleKey);
					return () =>
						window.removeEventListener("keydown", handleKey);
				}, [triggerEasterEgg]);

				return { typed, easterEgg, easterEggPos, triggerEasterEgg };
			}

			/* ─────────────────────────────────────────────
   Ear Tabs (Navigation)
   ───────────────────────────────────────────── */

			function EarTab({ tab, index, isActive, onClick }) {
				const w = 52;
				const h = 20;
				return (
					<div
						onClick={onClick}
						className="cursor-pointer"
						style={{
							position: "relative",
							width: w,
							height: h,
							marginLeft: index > 0 ? -2 : 0,
							zIndex: isActive ? 12 : 11,
							transition: "opacity 0.2s",
						}}
					>
						<svg
							width={w}
							height={h}
							viewBox={"0 0 " + w + " " + h}
							style={{ position: "absolute", top: 0, left: 0 }}
						>
							<path
								d={
									"M 1 " +
									h +
									" Q 2 " +
									(h - 2) +
									" 3 2 Q " +
									w * 0.2 +
									" 0.5 " +
									w * 0.35 +
									" 1 Q " +
									w * 0.5 +
									" " +
									(index % 2 === 0 ? "0" : "0.8") +
									" " +
									w * 0.65 +
									" " +
									(index % 2 === 0 ? "1.2" : "0.5") +
									" Q " +
									w * 0.8 +
									" " +
									(index % 2 === 0 ? "0.3" : "1") +
									" " +
									(w - 3) +
									" 1.5 Q " +
									(w - 1) +
									" " +
									(h - 2) +
									" " +
									(w - 1) +
									" " +
									h
								}
								fill={
									isActive
										? "#FFFFFF"
										: "rgba(253,250,246,0.25)"
								}
								stroke={COLORS.dark}
								strokeWidth={isActive ? 2 : 1.4}
								strokeLinejoin="round"
								strokeLinecap="round"
							/>
							{isActive && (
								<line
									x1="0"
									y1={h}
									x2={w}
									y2={h}
									stroke="#FFFFFF"
									strokeWidth="3.5"
								/>
							)}
						</svg>
						<div
							style={{
								position: "relative",
								zIndex: 2,
								display: "flex",
								alignItems: "center",
								justifyContent: "center",
								height: "100%",

								textDecoration: "none",
							}}
						>
							{tab.label.toLowerCase()}
						</div>
					</div>
				);
			}

									? activeTab === null

							return (
								<EarTab
									key={tab.id}
									tab={tab}
									index={i}
									isActive={isActive}
									onClick={() => {
										const newTab =

												? null
												: isActive
													? null
													: tab.id;
										const pageName =
											tab.id === "home"
												? "home"
												: isActive
													? "home"
													: tab.id;
										track("tab_click", {
											tab_name: pageName,
										});
										track("page_view", {
											page_title: pageName,
											page_location: "/" + pageName,
										});
										onTabChange(newTab);

										color: COLORS.ink,
										letterSpacing: "0.06em",
										lineHeight: 1.2,
										fontWeight: 700,
									}}
								>
									Amy Nguyen
									<span style={{ color: COLORS.accent }}>
										.
									</span>
								</div>
								<div
									style={{
										width: 40,
										height: 1,
										background: COLORS.separator,
										margin: "8px 0",
										opacity: 0.15,
									}}
								/>
							</div>
							<div
								style={{
									fontSize: 13,
									color: COLORS.ink,
									lineHeight: "20px",
									marginBottom: 16,
									letterSpacing: "0.03em",
									fontWeight: 600,
								}}
							>
								<span style={{ display: "block" }}>
									Engineer. Designer.
								</span>
								<span style={{ display: "block" }}>
									Stanford-trained. SF-based.
								</span>
							</div>

							<div
								className="tw-prompt"
								style={{ marginTop: 28 }}
							>
								{!typed ? (
									<div
										style={{
											display: "inline-flex",
											alignItems: "center",
											gap: 6,
										}}
									>
										<span
											style={{
												fontSize: 8,
												color: COLORS.muted,
												letterSpacing: "0.06em",
												fontWeight: 400,
												fontFamily: MONO,
											}}
										>
											press any key
										</span>
										<Cursor visible={showCursor} />
										<span
											style={{
												fontSize: 8,
												color: COLORS.faded,
												marginLeft: 2,
											}}
										>
											&#8595;
										</span>
									</div>
								) : (
									<div
										style={{
											display: "inline-flex",
											alignItems: "center",
											gap: 5,
										}}
									>
										<span
											style={{
												fontSize: 14,
												color: COLORS.ink,
												fontWeight: 700,
												fontFamily: MONO,
												animation:
													"letterPop 0.3s ease-out",
												display: "inline-block",
											}}
										>
											{typed}
										</span>
										<Cursor visible={showCursor} />
									</div>
								)}
							</div>
						</div>

						<div style={{ flex: 1 }} />
						<PageNumber number={1} />
						<div style={{ paddingBottom: 14 }} />

						<EasterEggNote
							egg={easterEgg}
							position={easterEggPos}
						/>
					</div>
				);
			}

			/* ─────────────────────────────────────────────
   Page: About
   ───────────────────────────────────────────── */

			function PageAbout({ onImageClick }) {
				return (
					<div
						className="tw-page-about"
						style={{ padding: "20px 24px", minHeight: 200 }}
					>
						<PageHeader title="About me" />
						<img
							src="src/assets/amy.jpg"
							alt="Amy"
							className="tw-about-photo"
							style={{
								width: 130,
								float: "right",
								marginLeft: 14,
								marginBottom: 10,
								border: "1.5px solid " + COLORS.dark,
								filter: "sepia(5%) contrast(95%)",
								transform: "rotate(1.5deg)",
								boxShadow: "none",
								cursor: "pointer",
							}}
							onClick={() => {
								onImageClick("src/assets/amy.jpg");
								track("art_lightbox_open", {
									image: "Amy Photo",
									medium: "Photo",
								});
							}}
						/>
						<div
							style={{
								fontSize: 13,
								color: COLORS.ink,
								marginTop: 6,
								lineHeight: "20px",
								letterSpacing: "0.03em",
								fontWeight: 600,
							}}
						>
							<p style={{ marginBottom: 8 }}>
								I entered Stanford with a background in writing
								and literature, but chose to pursue Computer
								Science because I wanted to push myself toward
								an intellectual challenge I hadn't yet mastered.
							</p>
							<p style={{ marginBottom: 8 }}>
								With no prior technical experience, I started
								from scratch: multivariable calculus,
								first-order logic, my first lines of code.
								Computer Science gave me a second language for
								thinking: decompose, debug, build.
							</p>
							<p style={{ marginBottom: 8 }}>
								Building at the seam of engineering and design,
								I take pride in my work and continually strive
								to refine my craft. Drawn to patterns, I have a
								gut feeling for how things align, when they
								work, and where they break.
							</p>
							<p style={{ marginBottom: 8 }}>
								I believe the most interesting things live at
								the edges: between disciplines, between
								identities, between what exists and what could.
								A jack of all trades -- the trade is knowing
								which one to pull out.
							</p>
							<div style={{ clear: "both" }} />
						</div>
						<div style={{ textAlign: "center", marginTop: 20 }}>
							<PageNumber number={2} />
						</div>
					</div>
				);
			}

			/* ─────────────────────────────────────────────
   Page: Art
   ───────────────────────────────────────────── */

			function ArtCard({
				img,
				index,
				isHovered,
				isDimmed,
				onHover,
				onLeave,
				onClick,
			}) {
				return (
					<div
						onMouseEnter={onHover}
						onMouseLeave={onLeave}
						onClick={onClick}
						className="cursor-pointer"
						style={{
							background: COLORS.paper,
							border: "1.5px solid " + COLORS.dark,
							borderRadius: 1,
							overflow: "hidden",
							boxShadow: isHovered
								? "2px 3px 8px rgba(58,48,32,0.12)"
								: "none",
							transform: isHovered
								? "translateY(-4px) rotate(-0.5deg)"
								: "none",
							transition: "all 0.25s ease",
							opacity: isDimmed ? 0.3 : 1,
						}}
					>
						<div
							style={{
								aspectRatio: "1",
								overflow: "hidden",
								borderBottom: "1px solid " + COLORS.dark,
							}}
						>
							<img
								src={img.src}
								alt={img.alt}
								style={{
									width: "100%",
									height: "100%",
									objectFit: "cover",
									display: "block",
									filter: "sepia(5%) contrast(96%)",
								}}
								onError={(e) => {
									e.target.style.display = "none";
								}}
							/>
						</div>
						<div style={{ padding: "6px 8px" }}>
							<div
								style={{
									fontSize: 9,
									color: COLORS.ink,
									letterSpacing: "0.03em",
									fontWeight: 600,
									opacity: 0.5,
								}}
							>
								{img.medium}
							</div>
						</div>
					</div>
				);
			}

			function PageArt({
				lightboxImg,
				onImageClick,
				hoveredCard,
				onHoverCard,
			}) {
				return (
					<div
						className="tw-page-art"
						style={{ padding: "20px 24px", minHeight: 200 }}
					>
						<PageHeader title="Art">
							<div
								style={{
									fontSize: 13,
									color: COLORS.ink,
									marginTop: 6,
									lineHeight: "20px",
									letterSpacing: "0.03em",
									fontWeight: 600,
								}}
							>
								A collection of works and studies across oil,
								watercolor, acrylic, and graphite.
							</div>
						</PageHeader>
						<div
							className="tw-art-grid"
							style={{
								display: "grid",
								gridTemplateColumns: "repeat(3, 1fr)",
								gap: 10,
								marginTop: 20,
							}}
						>
							{ART_IMAGES.map((img, i) => (
								<ArtCard
									key={i}
									img={img}
									index={i}
									isHovered={hoveredCard === i}
									isDimmed={
										lightboxImg && lightboxImg !== img.src
									}
									onHover={() => onHoverCard(i)}
									onLeave={() => onHoverCard(null)}
									onClick={(e) => {
										e.stopPropagation();
										onImageClick(img.src);
										track("art_lightbox_open", {
											image: img.title,
											medium: img.medium,
										});
									}}
								/>
							))}
						</div>
						<div style={{ textAlign: "center", marginTop: 24 }}>
							<PageNumber number={3} />
						</div>
					</div>
				);
			}

			/* ─────────────────────────────────────────────
   Page: Contact
   ───────────────────────────────────────────── */

			function PageContact() {
				const linkStyle = {
					color: COLORS.accent,
					textDecoration: "underline",
					textUnderlineOffset: 3,
				};
				return (
					<div
						className="tw-page-contact"
						style={{
							padding: "20px 24px 16px",
							minHeight: "100%",
							display: "flex",
							flexDirection: "column",
						}}
					>
						<div>
							<PageHeader title="Contact" />
							<div
								style={{
									fontSize: 13,
									color: COLORS.ink,
									lineHeight: "20px",
									letterSpacing: "0.03em",
									fontWeight: 600,
								}}
							>
								<p style={{ marginBottom: 12 }}>
									If you want to discuss design, tech, culture
									-- or debate whether Comic Sans is ever
									acceptable,{" "}
									<a
										href="https://www.linkedin.com/in/nguyen-amy"
										target="_blank"
										rel="noopener noreferrer"
										onClick={() =>
											track("outbound_click", {
												link_url: "linkedin",
												link_text:
													"message me on LinkedIn",
											})
										}
										style={linkStyle}
									>
										message me on LinkedIn
									</a>
									.
								</p>
								<p style={{ marginBottom: 12 }}>
									You can also keep up with what I'm reading
									on{" "}
									<a
										href="https://goodreads.com/amynlha"
										target="_blank"
										rel="noopener noreferrer"
										onClick={() =>
											track("outbound_click", {
												link_url: "goodreads",
												link_text: "Goodreads",
											})
										}
										style={linkStyle}
									>
										Goodreads
									</a>
									.
								</p>
							</div>
						</div>
						<div style={{ flex: 1 }} />
						<div style={{ paddingBottom: 14 }}>
							<PageNumber number={4} />
						</div>
					</div>
				);
			}

			/* ─────────────────────────────────────────────
   App (Composition Root)
   ───────────────────────────────────────────── */

			function App() {
				const [activeTab, setActiveTab] = React.useState(null);
				const [lightboxImg, setLightboxImg] = React.useState(null);
				const [hoveredCard, setHoveredCard] = React.useState(null);

				const showCursor = useBlinkingCursor();
				const doodles = useFloatingDoodles();
				const { typed, easterEgg, easterEggPos, triggerEasterEgg } =
					useTypewriterInput();

				React.useEffect(() => {
					track("page_view", {
						page_title: "home",
						page_location: "/home",
					});
				}, []);

				return (
					<div
						className="w-full flex flex-col items-center"
						style={{
							background: "#FFFFFF",
							height: "100vh",
							fontFamily: MONO,
							position: "relative",
							overflow: "hidden",
						}}
					>
						<DoodleBackground doodles={doodles} />

						<Lightbox
							src={lightboxImg}
							onClose={() => setLightboxImg(null)}
						/>

						<div
							className="w-full flex-1 flex flex-col items-center px-4 tw-outer tw-main-wrapper"
							style={{
								maxWidth: 900,
								position: "relative",
								zIndex: 2,
								height: "100vh",
								overflow: "hidden",
								display: "flex",
								flexDirection: "column",
								justifyContent: "center",
							}}
						>
							<div
								className="tw-content-col"
								style={{
									width: "100%",
									position: "relative",
									display: "flex",
									flexDirection: "column",
									alignItems: "center",
									justifyContent: "center",
									overflow: "visible",
								}}
							>
								<div
									className="tw-typewriter-wrap"
									style={{
										position: "relative",
										width: "75%",
										margin: "0 auto",
									}}
								>
									<img
										src="./typewriter.png"
										alt="Typewriter"
										style={{
											width: "100%",
											display: "block",
											pointerEvents: "none",
											position: "relative",
											zIndex: 9,
										}}
									/>

									<KeyboardOverlay
										onTap={(char) =>
											triggerEasterEgg(char, "tap")
										}
									/>

									<EarTabs
										activeTab={activeTab}
										onTabChange={setActiveTab}
									/>

									{/* Paper content area */}
									<div
										className="tw-paper-overlay"
										style={{
											position: "absolute",
											top: "1%",
											left: "25%",
											right: "19%",
											bottom: "63%",
											minHeight: 0,
											overflow: "hidden",
											display: "flex",
											flexDirection: "column",
											fontFamily: MONO,
											zIndex: 10,
										}}
									>
										<div
											className="paper-scroll"
											style={{
												flex: 1,
												overflowY: "auto",
												overflowX: "hidden",
												position: "relative",
											}}
										>
											{!activeTab && (
												<PageHome
													typed={typed}
													showCursor={showCursor}
													easterEgg={easterEgg}
													easterEggPos={easterEggPos}
												/>
											)}
											{activeTab === "art" && (
												<PageArt
													lightboxImg={lightboxImg}
													onImageClick={
														setLightboxImg
													}
													hoveredCard={hoveredCard}
													onHoverCard={setHoveredCard}
												/>
											)}
											{activeTab === "about" && (
												<PageAbout
													onImageClick={
														setLightboxImg
													}
												/>
											)}
											{activeTab === "contact" && (
												<PageContact />
											)}
										</div>
									</div>

									<div
										className="tw-footer"
										style={{
											textAlign: "center",
											paddingBottom: 2,
											paddingTop: 4,
											flexShrink: 0,
										}}
									>
										<p
											style={{
												fontSize: 10,
												color: COLORS.muted,
												letterSpacing: "0.15em",
												fontFamily: MONO,
											}}
										>
											Amy Nguyen &copy; 2026
										</p>
									</div>
								</div>
							</div>
						</div>
					</div>
				);
			}

			const root = ReactDOM.createRoot(document.getElementById("root"));
			root.render(<App />);
		</script>
	</body>
</html>
